server:
  port: 8080

spring:
  application:
    name: smzs-mall-app
  datasource:
    url: jdbc:postgresql://43.99.13.40:5432/smzs
    username: gaojunying
    password: gao0812
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# JWT 配置
jwt:
  secret: smzs_mall_secret_key_2026
  expiration: 86400000 # 24小时，单位毫秒

# 文件上传配置
upload:
  path: ./uploads/
  max-size: 10485760 # 10MB

# 短信配置（示例）
sms:
  expire-minutes: 5
  code-length: 6

# 健康检查配置
management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  health:
    defaults:
      enabled: true

logging:
  level:
    com.smzs.mall: debug
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace