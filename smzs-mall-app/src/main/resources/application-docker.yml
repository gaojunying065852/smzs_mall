server:
  port: 8080

spring:
  application:
    name: smzs-mall-app
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smzs_mall}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    timeout: 5000ms

# JWT 配置
jwt:
  secret: ${JWT_SECRET:smzs_mall_secret_key_2026}
  expiration: 86400000

# 文件上传配置
upload:
  path: /app/uploads/
  max-size: 10485760

logging:
  level:
    com.smzs.mall: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"