version: '3.8'

services:
  # PostgreSQL数据库
  postgres:
    image: postgres:13-alpine
    container_name: smzs-postgres
    environment:
      POSTGRES_DB: smzs_mall
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - smzs-network

  # Redis缓存（可选）
  redis:
    image: redis:6-alpine
    container_name: smzs-redis
    ports:
      - "6379:6379"
    networks:
      - smzs-network

  # 小程序服务
  app-service:
    build: 
      context: ./smzs-mall-app
      dockerfile: Dockerfile
    container_name: smzs-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/smzs_mall
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=123456
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - redis
    networks:
      - smzs-network

  # 管理后台服务
  manage-service:
    build:
      context: ./smzs-mall-manage
      dockerfile: Dockerfile
    container_name: smzs-manage
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/smzs_mall
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=123456
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - redis
    networks:
      - smzs-network

  # Nginx反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: smzs-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - app-service
      - manage-service
    networks:
      - smzs-network

volumes:
  postgres_data:

networks:
  smzs-network:
    driver: bridge