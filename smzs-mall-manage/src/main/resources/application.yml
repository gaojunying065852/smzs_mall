server:
  port: 8081

spring:
  application:
    name: smzs-mall-manage
  datasource:
    url: jdbc:postgresql://43.99.13.40:5432/smzs
    username: gaojunying
    password: gao0812
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# 健康检查配置
management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  health:
    defaults:
      enabled: true

# JWT配置
jwt:
  secret: smzs-mall-secret-key-2026
  expiration: 86400000  # 24小时，单位毫秒

logging:
  level:
    com.smzs.mall: debug
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace